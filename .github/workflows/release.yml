name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest
    env:
      BUILD_PLATFORM: Any CPU
    outputs:
      version: ${{ steps.release_tag.outputs.version }}

    steps:

    # Validate that the tag is a release tag (e.g., 1.0.0 or 1.0.0.0)
    - name: Validate Release Tag
      id: release_tag
      shell: pwsh
      run: |
        $TAG = $env:GITHUB_REF -replace '^refs/tags/', ''

        if ($TAG -match '^[0-9]+\.[0-9]+\.[0-9]+$' -or $TAG -match '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$') {
          Write-Host "Valid version tag: $TAG"
          [IO.File]::AppendAllText($env:GITHUB_OUTPUT, "version=${TAG}$([Environment]::NewLine)")
        } else {
          Write-Host "Invalid version tag: $TAG"
          exit 1
        }

    # Setup/Install the .NET SDKs
    - name: Setup/Install the .NET SDKs
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    # Setup MSBuild (needed for building .NET Framework projects)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    # Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        submodules: recursive
        fetch-depth: 0

    # Restore .NET tools
    - name: Run .NET tool restore
      shell: pwsh
      run: |
        dotnet tool restore

    # Restore MimeKit.sln
    - name: Restore MimeKit.sln
      shell: pwsh
      run: |
        dotnet restore MimeKit.sln

    # Build MimeKit
    - name: Build MimeKit
      shell: pwsh
      run: |
        dotnet msbuild MimeKit.sln -property:Platform=$env:BUILD_PLATFORM -property:Configuration=Release

    - name: Run Unit Tests
      if: false
      shell: pwsh
      run: |
        & ./scripts/test.ps1 -Configuration Release -GenerateCodeCoverage false

    # Create MimeKit NuGet package
    - name: Create MimeKit NuGet package
      shell: pwsh
      run: |
        nuget pack nuget/MimeKit.nuspec

    # Restore MimeKitLite.sln
    - name: Restore MimeKitLite.sln
      shell: pwsh
      run: |
        dotnet restore MimeKitLite.sln

    # Build MimeKitLite
    - name: Build MimeKitLite
      shell: pwsh
      run: |
        dotnet msbuild MimeKitLite.sln -property:Platform=$env:BUILD_PLATFORM -property:Configuration=Release

    # Create MimeKitLite NuGet package
    - name: Create MimeKitLite NuGet package
      shell: pwsh
      run: |
        nuget pack nuget/MimeKitLite.nuspec

    # Upload unsigned NuGet packages
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BuildArtifacts
        path: |
          MimeKit.${{ steps.release_tag.outputs.version }}.nupkg
          MimeKitLite.${{ steps.release_tag.outputs.version }}.nupkg

  sign:
    needs: build
    runs-on: windows-latest
    environment: release
    env:
      BUILD_PLATFORM: Any CPU
    permissions:
      id-token: write # Required for requesting the JWT
      contents: read

    steps:

    # Setup NuGet CLI (needed for nuget pack and nuget push)
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # Restore build artifacts from the build job
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: BuildArtifacts
        path: ./

    # Setup .NET (needed for the Sign CLI tool)
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    # Install Sign CLI tool
    - name: Install Sign CLI tool
      run: dotnet tool install --tool-path . --prerelease sign

    # Login to Azure using a ServicePrincipal configured to authenticate against a GitHub Action
    - name: 'Az CLI login'
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Sign MimeKit NuGet Package (sign CLI signs assemblies inside the .nupkg first, then the .nupkg itself)
    - name: Sign MimeKit NuGet Package
      shell: pwsh
      run: >
        ./sign code azure-key-vault
        MimeKit.${{ needs.build.outputs.version }}.nupkg
        --base-directory "${{ github.workspace }}"
        --publisher-name "MimeKit"
        --description "MimeKit"
        --description-url "https://github.com/jstedfast/MimeKit"
        --azure-credential-type "azure-cli"
        --azure-key-vault-url "https://sc-mimekit.vault.azure.net/"
        --azure-key-vault-certificate "SC-MIMEKIT"

    # Sign MimeKitLite NuGet Package (sign CLI signs assemblies inside the .nupkg first, then the .nupkg itself)
    - name: Sign MimeKitLite NuGet Package
      shell: pwsh
      run: >
        ./sign code azure-key-vault
        MimeKitLite.${{ needs.build.outputs.version }}.nupkg
        --base-directory "${{ github.workspace }}"
        --publisher-name "MimeKit"
        --description "MimeKitLite"
        --description-url "https://github.com/jstedfast/MimeKit"
        --azure-credential-type "azure-cli"
        --azure-key-vault-url "https://sc-mimekit.vault.azure.net/"
        --azure-key-vault-certificate "SC-MIMEKIT"

    # Upload signed packages as artifacts
    - name: Upload signed artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SignedArtifacts
        path: |
          MimeKit.${{ needs.build.outputs.version }}.nupkg
          MimeKitLite.${{ needs.build.outputs.version }}.nupkg

    # Get a short-lived NuGet API key
    - name: Get NuGet API Key
      uses: NuGet/login@v3
      id: nuget_login
      with:
        user: ${{ secrets.NUGET_USER }}

    # Publish MimeKit.{version}.nupkg to NuGet.org
    - name: Push MimeKit package to NuGet.org
      if: false
      shell: pwsh
      run: |
        nuget push $env:NUGET_PKG_PATH -ApiKey $env:NUGET_API_KEY -Source https://api.nuget.org/v3/index.json
      env:
        NUGET_PKG_PATH: MimeKit.${{ needs.build.outputs.version }}.nupkg
        NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}

    # Publish MimeKitLite.{version}.nupkg to NuGet.org
    - name: Push MimeKitLite package to NuGet.org
      if: false
      shell: pwsh
      run: |
        nuget push $env:NUGET_PKG_PATH -ApiKey $env:NUGET_API_KEY -Source https://api.nuget.org/v3/index.json
      env:
        NUGET_PKG_PATH: MimeKitLite.${{ needs.build.outputs.version }}.nupkg
        NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
